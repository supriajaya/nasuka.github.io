<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Developer</title>
<style>
body { margin: 0; padding: 20px 20px 140px 20px; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background-image: url('https://Developerfoods.site/image/ombak.gif'); background-repeat: no-repeat; background-size: cover; background-attachment: fixed; }
header { width: 100%; max-width: 800px; display: flex; justify-content: center; align-items: center; padding: 15px; background: #f0f0f0; border: 4px outset #fff; margin-bottom: 20px; box-sizing: border-box; }
.container { width: 650px; height: 390px; perspective: 1300px; perspective-origin: 50% -25%; margin: 50px auto; }
.carousel { transform-style: preserve-3d; transform: translateZ(-562px); position: relative; width: 650px; height: 390px; transition: 1s; }
.carousel a { position: absolute; border: 15px solid #222; opacity: .5; transition: 1s; width: 650px; height: 390px; background: transparent; cursor: pointer; display: block; }
.carousel a img { width: 100%; height: 100%; object-fit: cover; }
.carousel a:nth-child(1) { transform: translateZ(562px) scale(.8); }
.carousel a:nth-child(2) { transform: rotateY(120deg) translateZ(562px) scale(.8); }
.carousel a:nth-child(3) { transform: rotateY(240deg) translateZ(562px) scale(.8); }
.controls-wrapper { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 900px; align-items: center; margin-bottom: 20px; }
.control-row { display: flex; justify-content: center; width: 100%; }
.btn-retro { cursor: pointer; background: #dcdcdc; border: 12px outset #fff; padding: 20px 33px; margin: 7px; font: bold 42.9px 'Courier New', monospace; outline: none; color: #000; display: block; text-align: center; flex: 1; }
.btn-retro:active { border-style: inset; background: #c0c0c0; }
.btn-external { display: block; padding: 25px; margin: 20px 0; background: #000; border: 4px outset #ccc; text-decoration: none; color: #fff; font-weight: bold; text-align: center; font-size: 48px; }
input[type="radio"] { position: absolute; left: -9999px; }
#Developer:checked ~ .container .carousel { transform: translateZ(-562px); }
#cilok:checked ~ .container .carousel { transform: translateZ(-562px) rotateY(-120deg); }
#Kontak:checked ~ .container .carousel { transform: translateZ(-562px) rotateY(-240deg); }
#Developer:checked ~ .container .carousel a:nth-child(1) { transform: translateZ(562px) scale(1); opacity: 1; }
#cilok:checked ~ .container .carousel a:nth-child(2) { transform: rotateY(120deg) translateZ(562px) scale(1); opacity: 1; }
#Kontak:checked ~ .container .carousel a:nth-child(3) { transform: rotateY(240deg) translateZ(562px) scale(1); opacity: 1; }
#artikel-wrapper { width: 100%; max-width: 900px; border: 4px solid #000; min-height: 300px; font-size: 48px; line-height: 1.6; background: rgba(255, 255, 255, 0.9); text-align: center; }
.konten-artikel { padding: 20px; }
.galeri-foto { display: flex; justify-content: space-between; gap: 10px; margin: 20px 0; }
.galeri-foto img { width: 32%; height: auto; border: 4px solid #000; }
</style>
</head>
<body onload="initDefault()">
<header></header>
<input checked id="Developer" name="multiples" type="radio">
<input id="cilok" name="multiples" type="radio">
<input id="Kontak" name="multiples" type="radio">
<div class="container">
<div class="carousel">
<a onclick="window.AppInventor.setWebViewString('Developer')"><img src="https://nasuka.pro/gambar/developer.jpg"></a>
<a onclick="window.AppInventor.setWebViewString('cilok')"><img src="https://nasuka.pro/gambar/pelanggancilok.jpg"></a>
<a onclick="window.AppInventor.setWebViewString('Kontak')"><img src="https://nasuka.pro/gambar/whatsapp.jpg"></a>
</div>
</div>
<div class="controls-wrapper">
<div class="control-row">
<label class="btn-retro" for="Developer" onclick="updateInfo('', 'Developer')">Developer</label>
<label class="btn-retro" for="cilok" onclick="updateInfo('', 'cilok')">Cilok</label>
<label class="btn-retro" for="Kontak" onclick="updateInfo('', 'Kontak')">Kontak</label>
</div>
</div>
<div id="info-produk" style="text-align:center; font-size:39px; font-weight:bold; margin: 0 0 20px 0;"></div>
<div id="artikel-wrapper"><div id="konten-artikel" class="konten-artikel"></div></div>
<script>
const dataProduk = {

cilok: '<div class="galeri-foto"><img src="https://nasuka.pro/gambar/cilok1.jpg"><img src="https://nasuka.pro/gambar/cilok2.jpg"><img src="https://nasuka.pro/gambar/cilok3.jpg"></div>',
Kontak: '<div class="galeri-foto"><img src="https://nasuka.pro/gambar/kontak1.jpg"><img src="https://nasuka.pro/gambar/kontak2.jpg"><img src="https://nasuka.pro/gambar/kontak3.jpg"></div>',
Developer: '<div class="galeri-foto"><img src="https://nasuka.pro/gambar/developer1.jpg"><img src="https://nasuka.pro/gambar/developer2.jpg"><img src="https://nasuka.pro/gambar/developer3.jpg"></div>'



};
function updateInfo(nama, key) {
document.getElementById('info-produk').innerHTML = nama;
document.getElementById('konten-artikel').innerHTML = dataProduk[key];
}
function initDefault() {
updateInfo('', 'Developer');
}
</script>
</body>
</html>
