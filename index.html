<!DOCTYPE html>
<html lang="id">

<style>
body { margin: 0; padding: 20px 20px 140px 20px; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background-image: url('https://nasukafoods.site/image/ombak.gif'); background-repeat: no-repeat; background-size: cover; background-attachment: fixed; }
header { width: 100%; max-width: 800px; display: flex; justify-content: center; align-items: center; padding: 15px; background: #f0f0f0; border: 4px outset #fff; margin-bottom: 20px; box-sizing: border-box; position: relative; }
#display-saldo { font-weight: bold; padding: 10px; font-size: 47.88px; font-family: 'Courier New', monospace; color: #000; }
.container { width: 650px; height: 390px; perspective: 1300px; perspective-origin: 50% -25%; margin: 50px auto; }
.carousel { transform-style: preserve-3d; transform: translateZ(-702px); position: relative; width: 650px; height: 390px; transition: 1s; }
.carousel a { position: absolute; border: 15px solid #222; opacity: .5; transition: 1s; width: 650px; height: 390px; background:#ccc; cursor: pointer; display: block; }
.carousel a img { width: 100%; height: 100%; object-fit: cover; }
.carousel a:nth-child(1) { transform: translateZ(702px) scale(.8); }
.carousel a:nth-child(2) { transform: rotateY(60deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(3) { transform: rotateY(120deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(4) { transform: rotateY(180deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(5) { transform: rotateY(240deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(6) { transform: rotateY(300deg) translateZ(702px) scale(.8); }
.controls-wrapper { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 900px; align-items: center; }
.control-row { display: flex; justify-content: center; width: 100%; }
.btn-retro { cursor: pointer; background: #dcdcdc; border: 12px outset #fff; padding: 20px 33px; margin: 7px; font: bold 39px 'Courier New', monospace; outline: none; color: #000; display: block; text-align: center; flex: 1; }
.btn-retro:active { border-style: inset; background: #c0c0c0; }
.btn-external { display: block; padding: 25px; margin: 20px 0; background: #000; border: 4px outset #ccc; text-decoration: none; color: #fff; font-weight: bold; text-align: center; font-size: 32px; }
input[type="radio"] { position: absolute; left: -9999px; }
#partner:checked ~ .container .carousel { transform: translateZ(-702px); }
#cilok:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-60deg); }
#nasuka:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-120deg); }
#paket:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-180deg); }
#tentang:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-240deg); }
#kontak:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-300deg); }
#partner:checked ~ .container .carousel a:nth-child(1) { transform: translateZ(702px) scale(1); opacity: 1; }
#cilok:checked ~ .container .carousel a:nth-child(2) { transform: rotateY(60deg) translateZ(702px) scale(1); opacity: 1; }
#nasuka:checked ~ .container .carousel a:nth-child(3) { transform: rotateY(120deg) translateZ(702px) scale(1); opacity: 1; }
#paket:checked ~ .container .carousel a:nth-child(4) { transform: rotateY(180deg) translateZ(702px) scale(1); opacity: 1; }
#tentang:checked ~ .container .carousel a:nth-child(5) { transform: rotateY(240deg) translateZ(702px) scale(1); opacity: 1; }
#kontak:checked ~ .container .carousel a:nth-child(6) { transform: rotateY(300deg) translateZ(702px) scale(1); opacity: 1; }
#artikel-wrapper { width: 100%; max-width: 900px; margin-top: 20px; border: 4px solid #000; min-height: 300px; font-size: 32px; line-height: 1.6; background: rgba(255, 255, 255, 0.9); text-align: center; }
.konten-artikel { padding: 20px; }
.galeri-foto { display: flex; justify-content: space-between; gap: 10px; margin: 20px 0; }
.galeri-foto img { width: 32%; height: auto; border: 4px solid #000; }
</style>
