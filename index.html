<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Beli Voucher</title>
<style>
body { margin: 0; padding: 20px 20px 140px 20px; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background-image: url('https://nasukafoods.site/image/ombak.gif'); background-repeat: no-repeat; background-size: cover; background-attachment: fixed; }
header { width: 100%; max-width: 800px; display: flex; justify-content: center; align-items: center; padding: 15px; background: #f0f0f0; border: 4px outset #fff; margin-bottom: 20px; box-sizing: border-box; position: relative; }
#display-saldo { font-weight: bold; padding: 10px; font-size: 47.88px; font-family: 'Courier New', monospace; color: #000; }
.container { width: 650px; height: 390px; perspective: 1300px; perspective-origin: 50% -25%; margin: 50px auto; }
.carousel { transform-style: preserve-3d; transform: translateZ(-702px); position: relative; width: 650px; height: 390px; transition: 1s; }
.carousel a { position: absolute; border: 15px solid #222; opacity: .5; transition: 1s; width: 650px; height: 390px; background:#ccc; cursor: pointer; display: block; }
.carousel a img { width: 100%; height: 100%; object-fit: cover; }
.carousel a:nth-child(1) { transform: translateZ(702px) scale(.8); }
.carousel a:nth-child(2) { transform: rotateY(60deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(3) { transform: rotateY(120deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(4) { transform: rotateY(180deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(5) { transform: rotateY(240deg) translateZ(702px) scale(.8); }
.carousel a:nth-child(6) { transform: rotateY(300deg) translateZ(702px) scale(.8); }
.controls-wrapper { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 900px; align-items: center; }
.control-row { display: flex; justify-content: center; width: 100%; }
.btn-retro { cursor: pointer; background: #dcdcdc; border: 12px outset #fff; padding: 20px 33px; margin: 7px; font: bold 39px 'Courier New', monospace; outline: none; color: #000; display: block; text-align: center; flex: 1; }
.btn-retro:active { border-style: inset; background: #c0c0c0; }
.btn-external { display: block; padding: 15px; margin: 10px 0; background: #eee; border: 4px outset #ccc; text-decoration: none; color: #000; font-weight: bold; text-align: center; }
input[type="radio"] { position: absolute; left: -9999px; }
#partner:checked ~ .container .carousel { transform: translateZ(-702px); }
#voucher:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-60deg); }
#bikin:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-120deg); }
#proyek:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-180deg); }
#tentang:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-240deg); }
#tambahan:checked ~ .container .carousel { transform: translateZ(-702px) rotateY(-300deg); }
#partner:checked ~ .container .carousel a:nth-child(1) { transform: translateZ(702px) scale(1); opacity: 1; }
#voucher:checked ~ .container .carousel a:nth-child(2) { transform: rotateY(60deg) translateZ(702px) scale(1); opacity: 1; }
#bikin:checked ~ .container .carousel a:nth-child(3) { transform: rotateY(120deg) translateZ(702px) scale(1); opacity: 1; }
#proyek:checked ~ .container .carousel a:nth-child(4) { transform: rotateY(180deg) translateZ(702px) scale(1); opacity: 1; }
#tentang:checked ~ .container .carousel a:nth-child(5) { transform: rotateY(240deg) translateZ(702px) scale(1); opacity: 1; }
#tambahan:checked ~ .container .carousel a:nth-child(6) { transform: rotateY(300deg) translateZ(702px) scale(1); opacity: 1; }
#artikel-wrapper { width: 100%; max-width: 900px; margin-top: 20px; border: 4px solid #000; min-height: 300px; font-size: 45.6px; line-height: 1.6; background: rgba(255, 255, 255, 0.8); }
.konten-artikel { padding: 20px; }
</style>
</head>
<body>
<header>
<div id="display-saldo">Nasuka Foods</div>
</header>

<input checked id="partner" name="multiples" type="radio">
<input id="voucher" name="multiples" type="radio">
<input id="bikin" name="multiples" type="radio">
<input id="proyek" name="multiples" type="radio">
<input id="tentang" name="multiples" type="radio">
<input id="tambahan" name="multiples" type="radio">

<div class="container">
<div class="carousel">
<a href="partner.html"><img src="partner.jpg"></a>
<a href="voucher.html"><img src="voucher.png"></a>
<a href="bikin.html"><img src="bikin.png"></a>
<a href="proyek.html"><img src="proyek.jpg"></a>
<a href="tentang.html"><img src="tentang.png"></a>
<a href="tambahan.html"><img src="tambahan.png"></a>
</div>
</div>

<div id="info-produk" style="text-align:center; font-size:39px; font-weight:bold; margin: 20px;">Partner Cilok</div>

<div class="controls-wrapper">
<div class="control-row">
<label class="btn-retro" for="partner" onclick="updateInfo('Partner Cilok', 'partner')">Partner</label>
<label class="btn-retro" for="voucher" onclick="updateInfo('VoucherData', 'voucher')">VoucherData</label>
<label class="btn-retro" for="bikin" onclick="updateInfo('BikinApk', 'bikin')">BikinApk</label>
</div>
<div class="control-row">
<label class="btn-retro" for="proyek" onclick="updateInfo('ProyekAcp', 'proyek')">ProyekAcp</label>
<label class="btn-retro" for="tentang" onclick="updateInfo('TentangKami', 'tentang')">TentangKami</label>
<label class="btn-retro" for="tambahan" onclick="updateInfo('Lainnya', 'tambahan')">Lainnya</label>
</div>

<div id="artikel-wrapper">
    <div id="konten-artikel" class="konten-artikel">
        <a href="https://gofood.link" class="btn-external">GoFood</a>
        <a href="https://r.grab.com" class="btn-external">GrabFood</a>
        <a href="https://app.shopeepay.co.id" class="btn-external">ShopeeFood</a>
        <a href="https://vt.tiktok.com" class="btn-external">TikTok Shop</a>
    </div>
</div>
</div>

<script>
const dataProduk = {
    partner: '<a href="https://gofood.link" class="btn-external">GoFood</a><a href="https://r.grab.com" class="btn-external">GrabFood</a><a href="https://app.shopeepay.co.id" class="btn-external">ShopeeFood</a><a href="https://vt.tiktok.com" class="btn-external">TikTok Shop</a>',
    voucher: '<p>VoucherData tersedia untuk berbagai provider.</p><p>Harga terjangkau dan proses cepat.</p>',
    bikin: '<p>Jasa pembuatan aplikasi Android profesional.</p><p>Menggunakan Kodular dan AppInventor.</p>',
    proyek: '<p>Detail mengenai proyek ACP.</p><p>Proyek yang sedang berjalan saat ini.</p>',
    tentang: '<p>Nasuka Foods.</p><p>Berdedikasi memberikan kualitas terbaik bagi pelanggan.</p>',
    tambahan: '<p>Berbagai layanan tambahan lainnya.</p><p>Hubungi kami untuk kebutuhan Anda.</p>'
};

function updateInfo(nama, key) {
    document.getElementById('info-produk').innerHTML = nama;
    document.getElementById('konten-artikel').innerHTML = dataProduk[key];
}
</script>
</body>
</html>
