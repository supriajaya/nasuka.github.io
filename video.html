<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Album</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
* {box-sizing: border-box; margin: 0; padding: 0;}
body {
    background-image: url('https://nasuka.pro/gambar/galeri.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    padding: 10px;
}
.video-grid {display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%;}
.video-card {background: #000; border-radius: 4px; overflow: hidden; aspect-ratio: 9/16; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center;}
.video-card video {width: 100%; height: 100%; object-fit: cover;}
.btn-play {position: absolute; color: white; font-size: 24px; z-index: 2; pointer-events: none; text-shadow: 0 0 5px rgba(0,0,0,0.5);}
</style>
</head>
<body>

<div id="container-video-album" class="video-grid"></div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXo3x2WA13dElu0jiRcDjzbm-2499Zaro",
authDomain: "nasukawireless-5808a.firebaseapp.com",
databaseURL: "https://nasukawireless-5808a-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "nasukawireless-5808a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = JSON.parse(localStorage.getItem('user_data'));

function loadVideoAlbum() {
if (!user || !user.phone) return;
db.ref('testimoni_video/' + user.phone).once('value', snap => {
const cont = document.getElementById('container-video-album');
cont.innerHTML = '';
if (snap.exists()) {
snap.forEach(child => {
const v = child.val();
const div = document.createElement('div');
div.className = 'video-card';
div.innerHTML = '<div class="btn-play">▶</div><video src="' + v.video_link + '" playsinline loop></video>';

div.onclick = function() {
const vid = this.querySelector('video');
const btn = this.querySelector('.btn-play');

document.querySelectorAll('video').forEach(otherVid => {
if (otherVid !== vid) {
otherVid.pause();
otherVid.currentTime = 0;
otherVid.parentElement.querySelector('.btn-play').style.display = 'block';
}
});

if (vid.paused) {
vid.play();
btn.style.display = 'none';
} else {
vid.pause();
btn.style.display = 'block';
}
};
cont.appendChild(div);
});
}
});
}

if (user) {
window.onload = loadVideoAlbum;
}
</script>
</body>
</html>
