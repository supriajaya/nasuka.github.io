<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --primary: #6366f1;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
}
body { 
    font-family: 'Segoe UI', sans-serif; 
    padding: 20px; 
    background: var(--bg); 
    margin: 0;
    color: var(--text);
}
.header {
    position: absolute;
    top: 20px;
    left: 20px;
    cursor: pointer;
    font-size: 24px;
    font-weight: bold;
    padding: 10px;
}
#menu-dropdown {
    display: none;
    position: absolute;
    top: 60px;
    left: 20px;
    background: #e0e0e0;
    border: 4px outset #fff;
    padding: 10px;
    z-index: 1000;
}
.btn-logout {
    background: #dcdcdc;
    border: 3px outset #fff;
    padding: 7.5px 12.5px;
    cursor: pointer;
    font: bold 10px 'Courier New', monospace;
    color: #000;
}
.btn-logout:active { border-style: inset; background: #c0c0c0; }
.container { max-width: 500px; margin: 40px auto 0; }
.box { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; }
.profile-pic-wrapper { position: relative; margin-bottom: 30px; }
#preview-foto { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 4px solid var(--primary); cursor: pointer; }
.input-group { width: 100%; margin-bottom: 20px; }
.label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #64748b; display: block; }
input[type="text"], input[type="number"] { width: 100%; padding: 16px; font-size: 16px; border-radius: 12px; border: 2px solid #e2e8f0; box-sizing: border-box; }
input:focus { outline: none; border-color: var(--primary); }
button { width: 100%; padding: 18px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; border-radius: 12px; background: var(--primary); color: #fff; margin-top: 10px; }
#upload-foto { display: none; }
#alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(4px); }
.alert-retro { background: #fff; border-radius: 20px; padding: 30px; width: 85%; max-width: 400px; text-align: center; }
</style>
</head>
<body>

<div class="header" onclick="toggleMenu()">⋮</div>
<div id="menu-dropdown">
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
</div>

<div class="container">
    <div class="box">
        <div class="profile-pic-wrapper">
            <img id="preview-foto" src="https://via.placeholder.com/200" alt="Foto" onclick="document.getElementById('upload-foto').click()">
        </div>
        <input type="file" id="upload-foto" accept="image/*" onchange="previewImage(this)">
        
        <div class="input-group">
            <label class="label">Nama Lengkap</label>
            <input type="text" id="in-nama">
        </div>
        <div class="input-group">
            <label class="label">PIN (4 Digit Angka)</label>
            <input type="number" id="in-pin" pattern="\d*" inputmode="numeric" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
        </div>
        <div class="input-group">
            <label class="label">Alamat</label>
            <input type="text" id="in-alamat">
        </div>
        
        <button onclick="simpanProfil()">SIMPAN PERUBAHAN</button>
    </div>
</div>

<div id="alert-overlay">
    <div class="alert-retro">
        <div>Akun berhasil diperbarui</div>
        <button onclick="closeAlert()">TUTUP</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyDXo3x2WA13dElu0jiRcDjzbm-2499Zaro",
    authDomain: "nasukawireless-5808a.firebaseapp.com",
    databaseURL: "https://nasukawireless-5808a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nasukawireless-5808a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = JSON.parse(localStorage.getItem('user_data'));
let base64Foto = "";

if (user) {
    document.getElementById('in-nama').value = user.nama || '';
    document.getElementById('in-pin').value = user.pin || '';
    document.getElementById('in-alamat').value = user.alamat || '';
    if (user.foto) {
        document.getElementById('preview-foto').src = user.foto;
        base64Foto = user.foto;
    }
}

function toggleMenu() {
    const menu = document.getElementById('menu-dropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
}

function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Foto = e.target.result;
            document.getElementById('preview-foto').src = base64Foto;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function simpanProfil() {
    if (!user) return;
    const dataUpdate = {
        nama: document.getElementById('in-nama').value,
        pin: document.getElementById('in-pin').value,
        alamat: document.getElementById('in-alamat').value,
        foto: base64Foto
    };
    
    db.ref('users/' + user.phone).update(dataUpdate, (error) => {
        if (!error) {
            user = { ...user, ...dataUpdate };
            localStorage.setItem('user_data', JSON.stringify(user));
            document.getElementById('alert-overlay').style.display = 'flex';
        }
    });
}

function closeAlert() {
    document.getElementById('alert-overlay').style.display = 'none';
}
</script>
</body>
</html>
